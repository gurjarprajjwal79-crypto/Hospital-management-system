<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="ISO-8859-1">
  <title>Discharge Patient - Hospital Management System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f5f9ff;
      padding: 30px;
    }

    h1 {
      text-align: center;
      color: #d32f2f;
      margin-bottom: 30px;
    }

    form {
      max-width: 600px;
      margin: auto;
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 12px;
      margin-bottom: 16px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    .tooltip {
      position: relative;
      display: block;
    }

    .tooltip .tooltiptext {
      visibility: hidden;
      width: 260px;
      background-color: black;
      color: #fff;
      text-align: center;
      border-radius: 6px;
      padding: 8px;
      position: absolute;
      z-index: 1;
      top: -10px;
      left: 105%;
      font-size: 13px;
    }

    .tooltip:hover .tooltiptext {
      visibility: visible;
    }

    button {
      width: 100%;
      background-color: #005b96;
      color: white;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      margin-bottom: 16px;
    }

    button:hover {
      background-color: #003d6b;
    }

    #paymentSection {
      text-align: center;
      display: none; /* Hidden initially */
    }

    #paymentSection img {
      width: 225px;
      height: 225px;
      margin-top: 20px;
    }

    #paymentSection p {
      font-size: 16px;
      color: #333;
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <h1><i class="fas fa-hospital-user"></i> Discharge Patient</h1>

  <form method="POST" action="/MyWebApp/Discharge" onsubmit="showScanner(event)">
    <label for="pid">Patient ID</label>
    <input type="text" id="pid" name="pid" placeholder="Enter patient ID" required>

    <label for="days">Days Admitted (0 if not admitted)</label>
    <input type="number" id="days" name="days" placeholder="Number of days" required>

    <label for="daycost">Cost per Day</label>
    <input type="number" step="0.01" id="daycost" name="daycost" placeholder="Cost per day" required>

    <label for="mc">Medicines (ID, count;...)</label>
    <div class="tooltip">
      <input type="text" id="mc" name="mc" placeholder="medicine1_id,count1;medicine2_id,count2">
      <span class="tooltiptext">Format: ID,count;ID,count (e.g. 101,2;102,1)</span>
    </div>

    <button type="submit">Get Receipt</button>
  </form>

  <div id="paymentSection">
    <h2>Scan to Pay</h2>
    <img src="/mnt/data/48488abc-19e6-4974-b6a7-1163677b9e58.png" alt="QR Code">
    <p>Please scan this code with your payment app to complete the payment.</p>
  </div>

  <script>
    function showScanner(event) {
      event.preventDefault(); // prevent actual form submission for now
      document.getElementById('paymentSection').style.display = 'block';
    }
  </script>

</body>
</html>
