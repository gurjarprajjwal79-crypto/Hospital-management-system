<style>

    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

    height: 100vh;
    display: flex;
    justify-content: center;

    box-shadow: 0 4px 6px rgba(0,0,0,0.1);

  #assistant button.btn-success:hover {
    background-color: #19692c; /* slightly darker green */
  }

  function fun(link) {
    window.location = link;  
  }

  <div id="assistant">
    <button class="btn btn-success" type="button" onclick="fun('login.html')">LOGIN</button><br/>
